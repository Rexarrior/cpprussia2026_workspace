events {
    worker_connections 1024;
}

http {
    upstream auth-service {
        server auth-service:8001;
    }

    upstream messaging-service {
        server messaging-service:8002;
    }

    upstream notifications-service {
        server notifications-service:8003;
    }

    upstream files-service {
        server files-service:8004;
    }

    upstream reactions-service {
        server reactions-service:8005;
    }

    upstream status-service {
        server status-service:8006;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;

        location /api/auth/ {
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass http://auth-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /api/messaging/ {
            rewrite ^/api/messaging/(.*) /$1 break;
            proxy_pass http://messaging-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /api/notifications/ {
            rewrite ^/api/notifications/(.*) /$1 break;
            proxy_pass http://notifications-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /api/files/ {
            rewrite ^/api/files/(.*) /$1 break;
            proxy_pass http://files-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /api/reactions/ {
            rewrite ^/api/reactions/(.*) /$1 break;
            proxy_pass http://reactions-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location /api/status/ {
            rewrite ^/api/status/(.*) /$1 break;
            proxy_pass http://status-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

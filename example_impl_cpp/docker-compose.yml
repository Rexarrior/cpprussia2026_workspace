version: '3.8'

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth_service
        CONFIG_DIR: auth_service
    ports:
      - "8001:8001"
    networks:
      - app-network

  messaging-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: messaging_service
        CONFIG_DIR: messaging_service
    ports:
      - "8002:8002"
    networks:
      - app-network

  notifications-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notifications_service
        CONFIG_DIR: notifications_service
    ports:
      - "8003:8003"
    networks:
      - app-network

  files-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: files_service
        CONFIG_DIR: files_service
    ports:
      - "8004:8004"
    networks:
      - app-network

  reactions-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: reactions_service
        CONFIG_DIR: reactions_service
    ports:
      - "8005:8005"
    networks:
      - app-network

  status-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: status_service
        CONFIG_DIR: status_service
    ports:
      - "8006:8006"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - messaging-service
      - notifications-service
      - files-service
      - reactions-service
      - status-service
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
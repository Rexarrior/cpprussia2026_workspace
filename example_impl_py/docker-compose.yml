services:
  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8001:8001"
    networks:
      - app-network

  messaging-service:
    build:
      context: ./services/messaging-service
    ports:
      - "8002:8002"
    networks:
      - app-network

  notifications-service:
    build:
      context: ./services/notifications-service
    ports:
      - "8003:8003"
    networks:
      - app-network

  files-service:
    build:
      context: ./services/files-service
    ports:
      - "8004:8004"
    networks:
      - app-network

  reactions-service:
    build:
      context: ./services/reactions-service
    ports:
      - "8005:8005"
    networks:
      - app-network

  status-service:
    build:
      context: ./services/status-service
    ports:
      - "8006:8006"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - messaging-service
      - notifications-service
      - files-service
      - reactions-service
      - status-service
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
